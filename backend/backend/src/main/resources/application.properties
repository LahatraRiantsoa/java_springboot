spring.application.name=backend
server.port=8080

# Base de donnees MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/springboot_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.defer-datasource-initialization=true

# Initialisation des donnees (data.sql)
spring.sql.init.mode=always

# JWT
jwt.secret=MonSecretJWTTresLongPourEtreSecurise1234567890
jwt.expiration=86400000

# Upload fichiers (images produits)
spring.web.resources.static-locations=classpath:/static/
